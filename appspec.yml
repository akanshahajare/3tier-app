version: 0.0
os: linux

files:
  - source: tier1-frontend/
    destination: /opt/tier1-frontend

  - source: tier2-app/
    destination: /opt/tier2-app

hooks:

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/app_start.sh
      timeout: 300
      runas: root

    - location: scripts/web_start.sh
      timeout: 300
      runas: root
